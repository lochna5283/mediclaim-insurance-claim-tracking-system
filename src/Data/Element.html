<!DOCTYPE html>
<html>
<head>
    <title>Element Selector Example</title>

    <style>
        p {
            color: blue;
            font-size: 18px;
        }
    </style>
</head>

<body>

    <h2>CSS Element Selector</h2>

    <p>This is the first paragraph.</p>
    <p>This is the second paragraph.</p>
    <p>All paragraphs become blue.</p>

</body>
</html>
