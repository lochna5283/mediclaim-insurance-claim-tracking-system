<!DOCTYPE html>
<html>
<head>
    <title>ID Selector Example</title>

    <style>
        #heading {
            color: red;
            background-color: lightyellow;
            text-align: center;
            padding: 10px;
            border: 2px solid red;
        }
    </style>
</head>

<body>

    <h2 id="heading">ID Selector Example</h2>

    <p>
        The above heading is styled using an <b>ID selector</b>.
        An ID selector is unique and used only once in a page.
    </p>

</body>
</html>
