<!DOCTYPE html>
<html>
<head>
    <title>All Levels of CSS</title>

    <!-- External CSS link -->
    <link rel="stylesheet" href="style.css">

    <!-- Internal CSS -->
    <style>
        p {
            color: blue;
        }
    </style>
</head>

<body>

    <!-- External CSS -->
    <h2>External CSS Example</h2>

    <!-- Internal CSS -->
    <p>Internal CSS Example</p>

    <!-- Inline CSS -->
    <h3 style="color: red;">Inline CSS Example</h3>

</body>
</html>
